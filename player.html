<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; }</style>
</head>
<body>
    <div id="game"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        window.EJS_player = '#game';
        window.EJS_core = params.get('core');
        window.EJS_gameUrl = params.get('roms');
        window.EJS_startOnLoaded = true;
    </script>
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js"></script>
</body>
</html>
