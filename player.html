<!DOCTYPE html>
<html>
<head>
    <style>body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }</style>

<style>
    /* On essaie de masquer les éléments pubs connus d'EmulatorJS */
    .emu-ad, #interstitial, .adsbygoogle {
        display: none !important;
        visibility: hidden !important;
    }
</style>

</head>
<body>
    <div id="game"></div>
    <script>
        // On récupère les infos envoyées dans l'adresse (URL)
        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        window.EJS_core = params.get('core');
        window.EJS_gameUrl = params.get('rom');
        
        if (window.EJS_core === 'pcsx_rearmed') {
            window.EJS_biosUrl = 'roms/scph5501.bin';
        }
    </script>
    <script src="https://www.emulatorjs.com/loader.js"></script>
</body>
</html>
