  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 22px;
      color: #38bdf8;
      border-bottom: 1px solid #333;
      display: inline-block;
      padding-bottom: 5px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      justify-items: center;
      margin-bottom: 40px;
    }

    .game-card {
      background: #111;
      border-radius: 12px;
      padding: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(56,189,248,0.4);
    }

    /* Format Vertical (Mega Drive / Master System) */
    .game-card img {
      width: 240px;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background-color: #000;
      border-radius: 8px;
      border: 2px solid #222;
    }

    /* Format Horizontal (SNES) */
    .game-card.snes img {
      aspect-ratio: 4 / 3;
    }

    #emulator-container {
      width: 100%;
      max-width: 900px;
      height: 600px;
      background: #000;
      margin: 50px auto;
      border-radius: 12px;
      border: 2px solid #333;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      overflow: hidden;
      display: none; /* Caché par défaut, s'affiche au clic */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

  <!-- ZONE DE L'ÉMULATEUR -->
  <div id="emulator-container"></div>

  <script>
    function lancer(romPath, coreName) {
      const container = document.getElementById("emulator-container");
      
      // On affiche le container
      container.style.display = "block";

      // On construit l'URL pour player.html
      // encodeURIComponent est crucial pour Safari/Brave
      const playerUrl = `player.html?rom=${encodeURIComponent(romPath)}&core=${coreName}`;

      // On injecte l'iframe
      container.innerHTML = `<iframe src="${playerUrl}" allowfullscreen></iframe>`;

      // Petit effet : on scrolle vers l'émulateur
      container.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
