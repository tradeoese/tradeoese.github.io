<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Cloud Gaming Multi-Consoles</title>
    <style>
        /* Design style "Xbox Dark Mode" */
        body { 
            background: #121212; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; 
            text-align: center; 
        }

        h1 { color: #107C10; margin-bottom: 30px; text-shadow: 0 0 10px rgba(16, 124, 16, 0.5); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; color: #ccc; }

        .container { max-width: 1000px; margin: auto; }

        /* Grille des jeux */
.game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }

.game-card {
    background: transparent; /* On enlève le fond gris/noir inutile */
    padding: 0;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease;
    
    /* Supprime toute hauteur fixe si tu en avais mis une */
    height: auto !important; 
}

.game-card img {
    width: 100%;
    height: auto;       /* L'image définit la hauteur de la carte */
    display: block;
    object-fit: contain; 
    border-radius: 12px; /* L'arrondi se fait directement sur l'image */
}

.game-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(16, 124, 16, 0.6);
}

        /* ZONE DU LECTEUR (IFRAME) */
        #game-display { 
            width: 100%; 
            max-width: 850px; 
            height: 600px; 
            margin: 40px auto; 
            background: #000; 
            border: 4px solid #107C10; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(16, 124, 16, 0.3);
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info { font-size: 0.85em; color: #666; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 CLOUD RETRO STATION</h1>

    <!-- SECTION NINTENDO -->
    <h2>Super Nintendo</h2>
    <div class="game-grid">

<div class="game-card" onclick="lancer('roms/Super_Mario_World.sfc', 'snes')">
    <img src="/covers/snes/Super_Mario_World.png" alt="Super Mario World">
</div>
<div class="game-card" onclick="lancer('roms/Yoshis_Cookie.sfc', 'snes')">
    <img src="/covers/snes/Yoshis_Cookie.png" alt="Yoshis Cookie">
</div>
<div class="game-card" onclick="lancer('roms/Super_Bomberman.sfc', 'snes')">
    <img src="/covers/snes/Super_Bomberman.png" alt="Super Bomberman">
</div>
<div class="game-card" onclick="lancer('roms/Final_Fight.sfc', 'snes')">
    <img src="/covers/snes/Final_Fight.png" alt="Final Fight">
</div>
<div class="game-card" onclick="lancer('/roms/Final_Fight_3.sfc', 'snes')">
    <img src="/covers/snes/Final_Fight_3.png" alt="Final Fight 3">
</div>
<div class="game-card" onclick="lancer('roms/Donkey_Kong_Country.smc', 'snes')">
    <img src="/covers/snes/Donkey_Kong_Country.png" alt="Donkey Kong Country">
</div>
<div class="game-card" onclick="lancer('roms/F-ZERO.smc', 'snes')">
    <img src="/covers/snes/F-ZERO.png" alt="F-ZERO">
</div>
<div class="game-card" onclick="lancer('roms/The_Legend_of_Zelda.smc', 'snes')">
    <img src="/covers/snes/The_Legend_of_Zelda.png" alt="The Legend of Zelda">
</div>
<div class="game-card" onclick="lancer('roms/Flashback.sfc', 'snes')">
    <img src="/covers/snes/Flashback.png" alt="Flashback">
</div>
</div>
    
    <!-- SECTION SEGA -->
    <h2>Mega Drive</h2>
    <div class="game-grid">
        <div class="game-card" onclick="lancer('roms/sonic.gen', 'segaMD')"><p>Sonic Hedgehog</p></div>
    </div>
    <div class="game-grid">
        <div class="game-card" onclick="lancer('roms/sonic.md', 'segaMD')">
    <img src="/covers/snes/Sonic.png" alt="Sonic">
    </div>
    </div>



    
    <!-- SECTION PLAYSTATION -->
    <h2>PlayStation 1</h2>
    <div class="game-grid">
        <div class="game-card" onclick="lancer('https://onedrive.live.com/personal/4ee2a4c4e1bdda7d/_layouts/15/download.aspx?SourceUrl=%2Fpersonal%2F4ee2a4c4e1bdda7d%2FDocuments%2FPsx%2FMetal%20Slug%20X%2Echd', 'pcsx_rearmed')"><p>Metal Slug X ps</p></div>
    </div>



<div class="game-card" onclick="lancer('https://onedrive.live.com/download?cid=4EE2A4C4E1BDDA7D&resid=4EE2A4C4E1BDDA7D%21105&authkey=AOfdQOZ9VTyBltZ0uPZzP3M', 'pcsx_rearmed')">
    <p>Metal Slug X PS1</p>
</div>





    
    <!-- ZONE DE JEU -->
    <div id="game-display">
        <!-- L'iframe démarre vide, elle se chargera au clic -->
<!-- On ajoute l'attribut "allow" pour le son -->
<iframe id="game-frame" src="about:blank" allow="autoplay; gamepad"></iframe>
    
    </div>

    <p class="info">Appuyez sur un jeu pour lancer la session de Cloud Gaming.</p>
</div>

<script>
    function lancer(fichierUrl, typeConsole) {
        const frame = document.getElementById('game-frame');
        
        // On construit l'URL avec les paramètres du jeu
        // Cela va charger player.html en lui disant quelle ROM ouvrir
        const playerUrl = `player.html?rom=${encodeURIComponent(fichierUrl)}&core=${typeConsole}`;
        
        // On met à jour l'iframe (ce qui réinitialise proprement l'émulateur)
        frame.src = playerUrl;
        
        // Scroll fluide vers le lecteur
        document.getElementById('game-display').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
