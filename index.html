<!DOCTYPE html>
<html>
<head>
    <title>Mon Cloud Gaming SNES</title>
    <style>
        /* Un peu de style style "Dark Mode" comme Xbox */
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .game-container { width: 800px; height: 600px; margin: auto; border: 5px solid #107C10; } /* Vert Xbox */
    </style>
</head>
<body>
    <h1>SNES Cloud Hub</h1>
    <div class="game-container">
        <!-- L'émulateur s'affichera ici -->
        <div id="game"></div>
    </div>

    <script>
        // C'est ici qu'on demande à l'émulateur de charger ton jeu (ROM)
        EJS_player = '#game';
        EJS_core = 'snes'; 
        EJS_gameUrl = 'https://tradeoese.github.io/SuperMario/World.sfc'; // Lien vers ton fichier de jeu
    </script>
    <script src="https://www.emulatorjs.com/loader.js"></script>
</body>
</html>
